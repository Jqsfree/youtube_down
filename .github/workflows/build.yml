name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyside6 yt-dlp yt-dlp-ejs pyinstaller

      - name: Install deno
        run: |
          Invoke-WebRequest -Uri "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip" -OutFile deno.zip
          Expand-Archive deno.zip -DestinationPath .
          Move-Item deno.exe deno.exe

      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          Move-Item "$($ffmpegDir.Name)\bin\ffmpeg.exe" ffmpeg.exe
          Move-Item "$($ffmpegDir.Name)\bin\ffprobe.exe" ffprobe.exe

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed `
            --name "YouTubeDownloader" `
            --add-data "VERSION;." `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            --add-binary "deno.exe;." `
            --collect-all yt_dlp `
            --collect-all yt_dlp_ejs `
            --hidden-import PySide6.QtCore `
            --hidden-import PySide6.QtWidgets `
            main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader
          path: dist/YouTubeDownloader.exe
